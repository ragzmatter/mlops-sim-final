# Local Docker Registry — runs as a pod, NodePort 30500
# All pipeline images pushed to localhost:5000/mlops-sim:tag
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-registry
  namespace: kube-system
spec:
  replicas: 1
  selector: {matchLabels: {app: registry}}
  template:
    metadata: {labels: {app: registry}}
    spec:
      containers:
        - name: registry
          image: registry:2
          ports: [{containerPort: 5000}]
---
apiVersion: v1
kind: Service
metadata:
  name: registry-svc
  namespace: kube-system
spec:
  type: NodePort
  selector: {app: registry}
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050   # push: docker push localhost:30050/mlops-sim:latest
---
# Grafana — reads from Prometheus, port 30030
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops-monitoring
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
          ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: mlops-monitoring
spec:
  type: NodePort
  selector: {app: grafana}
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
